services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-baller}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baller}
      POSTGRES_DB: ${POSTGRES_DB:-baller}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-baller} -d ${POSTGRES_DB:-baller}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-baller}:${POSTGRES_PASSWORD:-baller}@db:5432/${POSTGRES_DB:-baller}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app:ro

volumes:
  pgdata_dev:
