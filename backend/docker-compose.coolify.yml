# Coolify: set ALL variables below in Coolify → Environment Variables (Production).
# They are referenced here as ${VAR} — Coolify injects them at deploy time.
# No Caddy — Coolify handles HTTPS for api.ballup.net → api:8000

services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    environment:
      # DB (password must not contain unencoded @ # : in URL — use simple chars or URL-encode)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_MINUTES: ${JWT_ACCESS_MINUTES:-15}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-30}
      # App
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      # Backblaze B2 (presigned uploads)
      B2_KEY_ID: ${B2_KEY_ID:-}
      B2_APP_KEY: ${B2_APP_KEY:-}
      B2_BUCKET: ${B2_BUCKET:-courtfinder-images}
      B2_ENDPOINT: ${B2_ENDPOINT:-https://s3.us-west-002.backblazeb2.com}
      B2_REGION: ${B2_REGION:-us-west-002}

volumes:
  pgdata:
